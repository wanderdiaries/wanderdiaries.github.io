<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Travel App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f6f8fb;
            padding-bottom: 120px;
        }

        .header-section {
            padding: 25px 20px;
        }

        .profile-btn {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,.08);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-box {
            background: white;
            border-radius: 18px;
            padding: 12px 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,.06);
        }

        .section-title {
            font-weight: 600;
            font-size: 22px;
        }

        .travel-card {
            min-width: 260px;
            border-radius: 25px;
            overflow: hidden;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
        }

        .travel-card img {
            height: 180px;
            object-fit: cover;
            width: 100%;
        }

        .price-badge {
            background: black;
            color: white;
            border-radius: 50px;
            padding: 8px 14px;
            font-size: 13px;
        }

        .recent-card {
            background: white;
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,.06);
            margin-bottom: 15px;
        }

        .recent-card img {
            width: 90px;
            height: 90px;
            border-radius: 15px;
            object-fit: cover;
        }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 500px;
            background: white;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,.15);
            z-index: 999;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            transition: .3s;
        }

        .nav-btn.active {
            background: black;
            color: white;
        }

        .popular-scroll {
            overflow-x: auto;
            display: flex;
            gap: 15px;
            padding-bottom: 10px;
        }

        .popular-scroll::-webkit-scrollbar {
            display: none;
        }

        .view-all {
            color: #2f6df5;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <!-- Header -->

    <div class="header-section">

        <div class="d-flex justify-content-between align-items-center">

            <div>
                <h5>Hello, Sunil 👋</h5>
                <h2 class="fw-bold mt-2">
                    Where do you want <br>
                    to go?
                </h2>
            </div>

            <div class="profile-btn">
                <i class="fa-regular fa-bell"></i>
            </div>

        </div>

        <!-- Search -->

        <div class="search-box mt-4">

            <div class="d-flex align-items-center">

                <i class="fa-solid fa-magnifying-glass text-secondary"></i>

                <input
                    type="text"
                    class="form-control border-0 shadow-none ms-2"
                    placeholder="Find a tourist destination">

                <i class="fa-solid fa-sliders"></i>

            </div>

        </div>

    </div>

    <!-- Popular Travel -->

    
    <div class="container-fluid px-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="section-title">Popular Travel</h4>
        <a href="#" class="view-all">View All</a>
    </div>

    <div class="popular-scroll" id="popularTravelContainer">
    </div>

</div>

<script>
    async function loadPopularTravel() {

    const container = document.getElementById(
        "popularTravelContainer"
    );

    container.innerHTML = `
        <div class="text-center w-100">
            Loading...
        </div>
    `;

    try {

        const response = await fetch(
            "https://tourandtravels-nine.vercel.app/api/get/sundarikanya1?category=prayagraj&page=1"
        );

        const result = await response.json();

        container.innerHTML = "";

        result.data.forEach(item => {

            const card = document.createElement("div");

            card.className = "travel-card";

            card.setAttribute(
                "data-aos",
                "fade-up"
            );

            card.innerHTML = `
                <a href="details.html?id=${item.id}"
                   style="text-decoration:none;color:inherit">

                    <img src="${item.thumbnail}" 
                         alt="${item.title}">

                    <div class="p-3">

                        <h6 class="fw-semibold">
                            ${item.title}
                        </h6>

                        <div class="d-flex justify-content-between align-items-center mt-3">

                            <small>
                                <i class="fa-solid fa-location-dot text-danger"></i>
                                ${item.location || "India"}
                            </small>

                            <span class="price-badge">
                                View
                            </span>

                        </div>

                    </div>

                </a>
            `;

            container.appendChild(card);

        });

    } catch (error) {

        console.error(error);

        container.innerHTML = `
            <div class="text-danger">
                Failed to load data
            </div>
        `;
    }
}

loadPopularTravel();
</script>

    
    <div class="container-fluid px-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h4 class="section-title">
            Trending Travel
        </h4>

        <a href="all.html?category=Mumbai"
           class="view-all">
            View All
        </a>

    </div>

    <div class="popular-scroll"
         id="mumbaiTravelContainer">
    </div>

</div>


<script>
    async function loadMumbaiTravel() {

    const container =
        document.getElementById(
            "mumbaiTravelContainer"
        );

    try {

        const response = await fetch(
            "https://tourandtravels-nine.vercel.app/api/get/sundarikanya1?category=Mumbai&page=1"
        );

        const result = await response.json();

        container.innerHTML = "";

        if (!result.data ||
            result.data.length === 0) {

            container.innerHTML =
                "<p>No destinations found.</p>";

            return;
        }

        result.data.forEach(item => {

            const card =
                document.createElement("div");

            card.className =
                "travel-card";

            card.setAttribute(
                "data-aos",
                "fade-up"
            );

            card.innerHTML = `

                <a href="details.html?id=${item.id}"
                   style="
                   text-decoration:none;
                   color:inherit;
                   ">

                    <img
                        src="${item.thumbnail}"
                        alt="${item.title}"
                        loading="lazy"
                    >

                    <div class="p-3">

                        <h6 class="fw-semibold">
                            ${item.title}
                        </h6>

                        <div class="d-flex justify-content-between align-items-center mt-3">

                            <small>
                                <i class="fa-solid fa-location-dot text-danger"></i>
                                ${item.location || 'Mumbai'}
                            </small>

                            <span class="price-badge">
                                Explore
                            </span>

                        </div>

                    </div>

                </a>

            `;

            container.appendChild(card);

        });

    } catch (error) {

        console.error(error);

        container.innerHTML = `
            <p class="text-danger">
                Failed to load destinations
            </p>
        `;
    }
}

loadMumbaiTravel();

</script>

    <div class="container-fluid px-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h4 class="section-title">
            Nearby Travel
        </h4>

        <a href="#" class="view-all">
            View All
        </a>

    </div>

    <div class="popular-scroll"
         id="nearbyTravelContainer">
    </div>

</div>


<script>

async function loadNearbyTravel() {

    const container =
        document.getElementById(
            "nearbyTravelContainer"
        );

    container.innerHTML =
        "<p>Getting location...</p>";

    navigator.geolocation.getCurrentPosition(

        async (position) => {

            try {

                const lat =
                    position.coords.latitude;

                const lng =
                    position.coords.longitude;

                const geoRes =
                    await fetch(
                        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
                    );

                const geoData =
                    await geoRes.json();

                const state =
                    geoData.address.state ||
                    "Uttar Pradesh";

                console.log(
                    "Detected State:",
                    state
                );

                const apiRes =
                    await fetch(
                        `https://tourandtravels-nine.vercel.app/api/get/sundarikanya1?category=${encodeURIComponent(state)}&page=1`
                    );

                const result =
                    await apiRes.json();

                container.innerHTML = "";

                if (
                    !result.data ||
                    result.data.length === 0
                ) {

                    container.innerHTML =
                        `<p>No travel places found in ${state}</p>`;

                    return;
                }

                result.data.forEach(item => {

                    container.innerHTML += `

                    <div class="travel-card">

                        <a href="details.html?id=${item.id}"
                           style="
                           text-decoration:none;
                           color:inherit;
                           ">

                            <img
                                src="${item.thumbnail}"
                                alt="${item.title}"
                            >

                            <div class="p-3">

                                <h6 class="fw-semibold">
                                    ${item.title}
                                </h6>

                                <div class="d-flex justify-content-between align-items-center mt-3">

                                    <small>
                                        <i class="fa-solid fa-location-dot text-danger"></i>
                                        ${state}
                                    </small>

                                    <span class="price-badge">
                                        Explore
                                    </span>

                                </div>

                            </div>

                        </a>

                    </div>

                    `;

                });

            } catch (err) {

                console.error(err);

                container.innerHTML =
                    "<p>Failed to load nearby travel.</p>";
            }

        },

        () => {

            container.innerHTML =
                "<p>Location permission denied.</p>";
        }

    );

}

loadNearbyTravel();

</script>

    <!-- Recent Collection -->

    
    <div class="container-fluid px-4 mt-5">

    <div class="d-flex justify-content-between">

        <h4 class="section-title">
            Recent Collection
        </h4>

        <a href="all.html" class="view-all">
            View All
        </a>

    </div>

    <div id="recentCollectionContainer"></div>

</div>

<script>

async function loadRecentCollection() {

    const container =
        document.getElementById(
            "recentCollectionContainer"
        );

    container.innerHTML =
        "<p>Loading...</p>";

    try {

        const response =
            await fetch(
                "https://tourandtravels-nine.vercel.app/api/get/sundarikanya?tag=&page=1"
            );

        const result =
            await response.json();

        container.innerHTML = "";

        if (
            !result.data ||
            result.data.length === 0
        ) {

            container.innerHTML =
                "<p>No data found</p>";

            return;
        }

        result.data.forEach(item => {

            container.innerHTML += `

            <a href="details.html?id=${item.id}"
               style="
               text-decoration:none;
               color:inherit;
               ">

                <div class="recent-card mt-3">

                    <div class="row align-items-center">

                        <div class="col-4">

                            <img
                                src="${item.thumbnail}"
                                alt="${item.title}"
                                loading="lazy"
                                onerror="this.src='https://via.placeholder.com/300x200';"
                            >

                        </div>

                        <div class="col-8">

                            <h6 class="fw-bold">
                                ${item.title}
                            </h6>

                            <p class="text-muted small mb-2">
                                ${item.location || 'India'}
                            </p>

                            <span class="price-badge">
                                Explore
                            </span>

                        </div>

                    </div>

                </div>

            </a>

            `;

        });

    } catch (error) {

        console.error(error);

        container.innerHTML = `
            <p class="text-danger">
                Failed to load collection
            </p>
        `;
    }
}

loadRecentCollection();

</script>

    <!-- Bottom Navigation -->

    <div class="bottom-nav">

        <div class="d-flex justify-content-around">

            <div class="nav-btn active">
                <i class="fa-solid fa-house"></i>
            </div>

            <div class="nav-btn">
                <i class="fa-regular fa-map"></i>
            </div>

            <div class="nav-btn">
                <i class="fa-solid fa-plus"></i>
            </div>

            <div class="nav-btn">
                <i class="fa-regular fa-heart"></i>
            </div>

            <div class="nav-btn">
                <i class="fa-regular fa-user"></i>
            </div>

        </div>

    </div>

    <!-- Scripts -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 800
        });
    </script>

</body>

</html>
