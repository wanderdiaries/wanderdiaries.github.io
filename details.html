<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Details</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
    --bg-gradient-start: #f4f6f3;
    --bg-gradient-end: #e5ebe5;
    --text-main: #1a1e1b;
    --text-muted: #6a736c;
    --card-bg: #ffffff;
    --card-shadow: 0 12px 35px rgba(112, 121, 114, 0.05);
    --badge-bg: #000000;
}

* {
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    letter-spacing: -0.01em;
}

body {
    background: linear-gradient(180deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
    background-attachment: fixed;
    color: var(--text-main);
    min-height: 100vh;
}

/* Premium Carousel Backing */
.carousel-container {
    position: relative;
    padding: 12px 12px 0 12px;
}

.hero-carousel-inner {
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.04);
}

.hero-img {
    height: 380px;
    object-fit: cover;
}

/* Details Panel Overlays */
.details {
    padding: 24px;
}

/* Luxury Card Blocks */
.cardx {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 20px;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(255, 255, 255, 0.6);
    margin-bottom: 20px;
}

/* Section Headings */
h2#placeTitle {
    font-weight: 700;
    font-size: 1.65rem;
    color: var(--text-main);
    line-height: 1.25;
}

#placeLocation {
    font-size: 0.88rem;
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 4px;
}

h5 {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 16px;
}

/* Quick Metrics Grid */
.metric-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 14px 10px;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(255, 255, 255, 0.6);
    text-align: center;
}

.metric-card div {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text-main);
}

.metric-card small {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    font-weight: 500;
    letter-spacing: 0.03em;
    display: block;
    margin-top: 2px;
}

/* Share Icon Circle */
.btn-share-circle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #ffffff;
    border: none;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: var(--card-shadow);
    color: var(--text-main);
    transition: transform 0.2s;
}

.btn-share-circle:active {
    transform: scale(0.92);
}

/* --- PREMIUM STUNNING OPENING HOURS STRUCTURE --- */
.opening-hours-table {
    width: 100%;
}

.opening-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #eef2ef;
}

.opening-row:last-child {
    border-bottom: none;
}

.day-label {
    font-weight: 600;
    font-size: 0.88rem;
    color: var(--text-main);
    text-transform: uppercase;
    letter-spacing: 0.02em;
}

.time-value {
    font-weight: 500;
    font-size: 0.88rem;
    color: var(--text-muted);
    background: #f1f4f1;
    padding: 4px 12px;
    border-radius: 12px;
}
/* ------------------------------------------------ */

/* Pricing Row Pill Display */
.price-box {
    background: #f7faf7;
    border-radius: 16px;
    padding: 12px;
    text-align: center;
}

.price-box span {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: block;
    margin-bottom: 2px;
}

.price-box b {
    font-size: 1rem;
    color: var(--text-main);
}

/* Beautiful Horizontal Lists */
.gallery-scroll, .nearby-scroll {
    display: flex;
    overflow-x: auto;
    gap: 14px;
    padding-bottom: 6px;
    scrollbar-width: none;
}

.gallery-scroll::-webkit-scrollbar, .nearby-scroll::-webkit-scrollbar {
    display: none;
}

.gallery-scroll img {
    width: 150px;
    height: 110px;
    object-fit: cover;
    border-radius: 20px;
    flex-shrink: 0;
}

.nearby-card {
    min-width: 190px;
    background: var(--card-bg);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(255, 255, 255, 0.6);
}

.nearby-card img {
    width: 100%;
    height: 115px;
    object-fit: cover;
}

.nearby-title {
    padding: 12px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-main);
}

/* Ultra Premium Action Buttons */
.btn-map-action {
    background: #ffffff;
    border: 1px solid #d4ddd6;
    color: var(--text-main);
    border-radius: 18px;
    font-weight: 600;
    font-size: 0.92rem;
    padding: 14px;
    box-shadow: var(--card-shadow);
}

.btn-web-action {
    background: transparent;
    border: 1px dashed #b5c2b7;
    color: var(--text-muted);
    border-radius: 18px;
    font-weight: 500;
    font-size: 0.9rem;
    padding: 12px;
}

/* Luxury Dock Bottom Bar */
.bottom-bar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 440px;
    background: #ffffff;
    padding: 12px 20px;
    border-radius: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    z-index: 1000;
    border: 1px solid rgba(255, 255, 255, 0.8);
}

.bottom-fee-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.02em;
}

.bottom-price-value {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-main);
}

.btn-premium-action {
    background: var(--badge-bg);
    color: #ffffff;
    border: none;
    border-radius: 20px;
    padding: 10px 24px;
    font-weight: 600;
    font-size: 0.88rem;
    transition: background 0.2s;
}

.btn-premium-action:active {
    background: #222;
}

.spacer {
    height: 110px;
}
</style>
</head>
<body>

<div class="carousel-container">
    <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner hero-carousel-inner" id="heroImages"></div>
        <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
    </div>
</div>

<div class="details">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h2 id="placeTitle"></h2>
            <div id="placeLocation"></div>
        </div>
        <button class="btn-share-circle" id="shareBtn"><i class="fa fa-share"></i></button>
    </div>

    <div class="row g-2 mb-4">
        <div class="col-4"><div class="metric-card"><div id="openTime">-</div><small>Open</small></div></div>
        <div class="col-4"><div class="metric-card"><div id="ticketPrice">-</div><small>Entry</small></div></div>
        <div class="col-4"><div class="metric-card"><div id="totalDays">-</div><small>Days</small></div></div>
    </div>

    <div class="cardx">
        <h5>About</h5>
        <div id="placeDescription" style="font-size:0.9rem; line-height:1.55; color:#3a423c;"></div>
    </div>

    <div class="cardx">
        <h5>Opening Hours</h5>
        <div class="opening-hours-table" id="openingHoursContainer">
            </div>
    </div>

    <div class="cardx">
        <h5>Ticket Prices</h5>
        <div class="row g-2">
            <div class="col-4"><div class="price-box"><span>Indian</span><b id="indianPrice">-</b></div></div>
            <div class="col-4"><div class="price-box"><span>Foreigner</span><b id="foreignerPrice">-</b></div></div>
            <div class="col-4"><div class="price-box"><span>Child</span><b id="childPrice">-</b></div></div>
        </div>
    </div>

    <div class="cardx">
        <h5>Best Time To Visit</h5>
        <div id="bestTime" style="font-size:0.9rem; color:#3a423c; font-weight: 500;"></div>
    </div>

    <div class="cardx">
        <h5>Facilities</h5>
        <ul id="facilitiesList" style="font-size:0.9rem; color:#3a423c; padding-left:16px; margin:0;"></ul>
    </div>

    <a id="mapBtn" target="_blank" class="btn btn-map-action w-100 mb-2 d-flex align-items-center justify-content-center gap-2">
        <i class="fa-solid fa-map-location-dot text-success"></i> Open Live Route Map
    </a>
    <a id="websiteBtn" target="_blank" class="btn btn-web-action w-100 mb-4">
        <i class="fa-solid fa-globe me-1"></i> Visit Official Site Portal
    </a>

    <h5 class="mb-2 px-1">Gallery Media</h5>
    <div id="galleryContainer" class="gallery-scroll mb-4"></div>

    <h5 class="mb-2 px-1">Nearby Attractions</h5>
    <div id="nearbyContainer" class="nearby-scroll"></div>
</div>

<div class="spacer"></div>

<div class="bottom-bar d-flex justify-content-between align-items-center">
    <div>
        <div class="bottom-fee-label">Entry Fee</div>
        <h5 id="bottomPrice" class="bottom-price-value mb-0"></h5>
    </div>
    <button class="btn-premium-action" id="visitBtn">Plan Visit</button>
</div>

<script>
const id = new URLSearchParams(location.search).get("id");

async function loadPlace(){
    const res = await fetch(`https://tourandtravels-nine.vercel.app/api/get/sundarikanya?id=${id}`);
    const data = await res.json();

    placeTitle.textContent = data.title || "";
    placeLocation.innerHTML = `<i class="fa-solid fa-location-dot text-danger me-1"></i> ${data.location || ''}`;
    placeDescription.innerHTML = marked.parse(data.description || '');

    openTime.textContent = data.opening_time || '-';
    ticketPrice.textContent = '₹' + (data.ticket_prices?.indian || 0);
    totalDays.textContent = (data.opening_days || []).length;

    // --- POPULATES THE RE-DESIGNED CLEAN TIMING ROWS ---
    const timingContainer = document.getElementById("openingHoursContainer");
    timingContainer.innerHTML = "";
    if(data.opening_days && data.opening_days.length > 0) {
        const timeString = `${data.opening_time || '09:00 AM'} - ${data.closing_time || '06:00 PM'}`;
        data.opening_days.forEach(day => {
            const row = document.createElement("div");
            row.className = "opening-row";
            row.innerHTML = `
                <div class="day-label">${day}</div>
                <div class="time-value">${timeString}</div>
            `;
            timingContainer.appendChild(row);
        });
    } else {
        timingContainer.innerHTML = `<div class="text-muted" style="font-size:0.9rem;">No operational data listed.</div>`;
    }
    // ----------------------------------------------------

    indianPrice.textContent = '₹' + (data.ticket_prices?.indian || 0);
    foreignerPrice.textContent = '₹' + (data.ticket_prices?.foreigner || 0);
    childPrice.textContent = '₹' + (data.ticket_prices?.child || 0);

    bestTime.textContent = data.best_time_to_visit || 'Any season';
    facilitiesList.innerHTML = (data.facilities || ['General Amenities Included']).map(x => `<li class="mb-1">${x}</li>`).join('');

    mapBtn.href = data.map_url || '#';
    websiteBtn.href = data.official_website || '#';

    bottomPrice.textContent = (data.ticket_prices?.indian || 0) == 0 ? 'Free' : '₹' + data.ticket_prices.indian;

    visitBtn.onclick = () => window.open(data.map_url, '_blank');

    const images = [data.thumbnail, ...(data.videourl || [])].filter(Boolean);

    heroImages.innerHTML = images.map((img, i) => `
        <div class="carousel-item ${i === 0 ? 'active' : ''}">
            <img src="${img}" class="d-block w-100 hero-img">
        </div>`).join('');

    // ... rest of your loadPlace() code above ...

    galleryContainer.innerHTML = images.map(img => `<img src="${img}" loading="lazy">`).join('');

    // --- UPDATED NEARBY DESTINATIONS LOGIC BASED ON CITY/STATE ---
    let locationQuery = "Mumbai"; // Default fallback city

    if (data.location && data.location.trim() !== "") {
        const locationParts = data.location.split(',');
        if (locationParts.length >= 2) {
            // Extracts the city or state (e.g., if "Colaba, Mumbai, Maharashtra", it takes "Mumbai")
            locationQuery = locationParts[locationParts.length - 2].trim(); 
        } else {
            locationQuery = locationParts[0].trim();
        }
    } else if (data.category && data.category.length > 0) {
        // Fallback to category string if location field isn't present
        locationQuery = data.category[0];
    }

    try {
        // Request destinations matching the location area query
        const nres = await fetch(`https://tourandtravels-nine.vercel.app/api/get/sundarikanya1?category=${encodeURIComponent(locationQuery)}&page=1`);
        const nd = await nres.json();

        if (nd.data && nd.data.length > 0) {
            nearbyContainer.innerHTML = nd.data
            .filter(x => x.id != data.id) // Exclude current place
            .slice(0, 10)
            .map(x => `
                <a href="details.html?id=${x.id}" style="text-decoration:none;color:inherit">
                    <div class="nearby-card">
                        <img src="${x.thumbnail}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image';">
                        <div class="nearby-title text-truncate">${x.title}</div>
                    </div>
                </a>`).join('');
        } else {
            nearbyContainer.innerHTML = `<div class="text-muted ps-2" style="font-size:0.85rem;">No other nearby attractions found.</div>`;
        }
    } catch (err) {
        console.error("Error loading nearby locations:", err);
        nearbyContainer.innerHTML = `<div class="text-muted ps-2" style="font-size:0.85rem;">Failed to pull nearby layout destinations.</div>`;
    }

    shareBtn.onclick = () => {
        if (navigator.share) {
            navigator.share({title: data.title, url: location.href});
        }
    };
}
loadPlace();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
