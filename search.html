<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore — Elite Dynamic Destination Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --text-primary: #111412;
    --text-secondary: #5a655e;
    --ta-green: #00aa6c;
    --ta-bg-empty: #e4e8e5;
    --bg-light: #f6f8f6;
    --accent: #222523;
}

* {
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    letter-spacing: -0.015em;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: #ffffff;
    color: var(--text-primary);
    padding-bottom: 50px;
    overflow-x: hidden;
}

/* Premium Top Navigation Header Grid */
.top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: #ffffff;
    border-bottom: 1px solid #f0f3f1;
}
.nav-search-container {
    flex-grow: 1;
    margin: 0 14px;
    background: var(--bg-light);
    border-radius: 24px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.nav-search-container input {
    border: none;
    background: none;
    width: 100%;
    outline: none;
    font-size: 0.95rem;
    font-weight: 500;
}

/* Elite Carousel Slider Framework */
.hero-slider-frame {
    position: relative;
    width: 100%;
    height: 380px;
    background: #e9ecef;
}
.hero-slider-frame .carousel,
.hero-slider-frame .carousel-inner,
.hero-slider-frame .carousel-item {
    height: 100%;
}
.hero-slider-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.carousel-overlay-shadow {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 2;
}
.gallery-badge {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(17, 20, 18, 0.75);
    backdrop-filter: blur(8px);
    color: #ffffff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    z-index: 10;
}

/* Title Headline Hierarchy Blocks */
.title-block {
    padding: 24px 16px 12px 16px;
}
.destination-headline {
    font-size: 2.1rem;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.15;
}
.essential-tagline {
    font-size: 1.25rem;
    font-weight: 700;
    margin-top: 22px;
    margin-bottom: 6px;
}

/* Interactive Pill Navigation Row */
.capsule-row {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 4px 16px 20px 16px;
    scrollbar-width: none;
}
.capsule-row::-webkit-scrollbar { display: none; }
.capsule {
    border: 1px solid var(--text-primary);
    border-radius: 24px;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    background: #ffffff;
}
.capsule.active {
    background: var(--text-primary);
    color: #ffffff;
}

/* Layout System — Stunning Segments Viewports */
.category-section {
    padding: 24px 0;
    border-bottom: 6px solid var(--bg-light);
}
.category-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px 14px 16px;
}
.category-title {
    font-size: 1.35rem;
    font-weight: 800;
    color: var(--text-primary);
    text-transform: capitalize;
}
.see-all-link {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-primary);
    text-decoration: underline;
}

/* Horizontal Swiper Track */
.stunning-horizontal-swiper {
    display: flex;
    overflow-x: auto;
    gap: 16px;
    padding: 0 16px 10px 16px;
    scrollbar-width: none;
}
.stunning-horizontal-swiper::-webkit-scrollbar { display: none; }

/* Smaller & High-end Card Geometry */
.travel-card {
    text-decoration: none !important;
    color: inherit;
    display: block;
    width: 210px;
    flex-shrink: 0;
}
.card-photo-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    overflow: hidden;
    background: #f0f0f0;
}
.card-photo-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
}
.travel-card:hover .card-photo-wrapper img {
    transform: scale(1.05);
}
.heart-icon-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 32px;
    height: 32px;
    background: #ffffff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    font-size: 0.9rem;
    z-index: 5;
}

.item-name-row {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    margin-top: 10px;
}
.item-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
}

/* TripAdvisor Bubble Dots System Grid */
.rating-bar {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 4px;
}
.rating-num {
    font-size: 0.85rem;
    font-weight: 700;
}
.green-bubble-box {
    display: inline-flex;
    gap: 3px;
}
.bubble-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--ta-green);
}
.bubble-dot.empty {
    background: var(--ta-bg-empty);
}
.review-count-text {
    font-size: 0.8rem;
    color: var(--text-secondary);
}
.subtitle-tags {
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-top: 3px;
}
</style>
</head>
<body>

<div class="top-nav">
    <i class="fa-solid fa-bars-staggered fs-5"></i>
    <div class="nav-search-container">
        <i class="fa fa-search text-secondary"></i>
        <input type="text" id="topSearchInput" placeholder="Where to?">
    </div>
    <i class="fa-regular fa-circle-user fs-5"></i>
</div>

<div class="hero-slider-frame">
    <div class="carousel-overlay-shadow"></div>
    <div id="dynamicHeroCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-interval="3500">
        <div class="carousel-inner" id="heroCarouselInnerCanvas">
            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1548013146-72479768bada?w=1000" alt="Placeholder Grid View">
            </div>
        </div>
    </div>
    <div class="gallery-badge" id="galleryCountBadge"><i class="fa-regular fa-images me-1"></i> 0</div>
</div>

<div class="title-block">
    <h1 class="destination-headline" id="mainDestinationTitle">Destination, India</h1>
    <div class="essential-tagline">Essential <span id="essentialStateName">Destination</span></div>
    <p class="text-secondary small mb-0">Quintessential spots sharing highly matched tags and community ratings.</p>
</div>

<div class="capsule-row" id="dynamicFilterCapsuleBar">
    <div class="capsule active">Overview</div>
    <div class="capsule">Highly Matched Tags</div>
</div>

<div id="dynamicSplitCategoriesWrapper">
    <div class="text-center py-5 text-muted small">Analyzing data signatures...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Generate precise green bubble graphics row execution
function buildRatingDotsHtml(rating) {
    const fixedRating = parseFloat(rating) || 4.4;
    let html = '<div class="green-bubble-box">';
    for (let i = 1; i <= 5; i++) {
        html += `<span class="bubble-dot ${i <= Math.floor(fixedRating) ? '' : 'empty'}"></span>`;
    }
    html += '</div>';
    return html;
}

// Global Core Integration Matrix — Computes matching tag matrices dynamically
async function buildDynamicMatchingInterface() {
    const urlParams = new URLSearchParams(window.location.search);
    let targetState = urlParams.get('query') || "Uttar Pradesh";

    // Standardize naming profiles against address bar mutations
    targetState = targetState.replace(/prradesh/i, 'Pradesh');

    document.getElementById('topSearchInput').value = targetState;
    document.getElementById('mainDestinationTitle').textContent = `${targetState}, India`;
    document.getElementById('essentialStateName').textContent = targetState;

    try {
        const url = `https://tourandtravels-nine.vercel.app/api/get/search?query=${encodeURIComponent(targetState.trim())}&page=1&limit=36`;
        const res = await fetch(url);
        const json = await res.json();
        const results = json.data || [];

        const sliderCanvas = document.getElementById('heroCarouselInnerCanvas');
        const countBadge = document.getElementById('galleryCountBadge');
        const contentWrapper = document.getElementById('dynamicSplitCategoriesWrapper');

        if(results.length === 0) {
            contentWrapper.innerHTML = `<div class="p-4 text-center text-muted small">No items matched the requested region query profiles.</div>`;
            return;
        }

        // --- STEP 1: RENDER AUTOMATED 5-6 RANDOM SLIDESHOW IMAGES ---
        const pickedImages = results
            .map(item => item.thumbnail)
            .filter(Boolean)
            .sort(() => 0.5 - Math.random())
            .slice(0, 6);

        if(pickedImages.length > 0) {
            sliderCanvas.innerHTML = pickedImages.map((imgUrl, i) => `
                <div class="carousel-item ${i === 0 ? 'active' : ''}">
                    <img src="${imgUrl}" onerror="this.src='https://images.unsplash.com/photo-1548013146-72479768bada?w=1000';">
                </div>`).join('');
            countBadge.innerHTML = `<i class="fa-regular fa-images me-1"></i> ${results.length * 3}`;
        }

        // --- STEP 2: DYNAMICALLY GROUP BY COMMON OVERLAPPING CATEGORIES & TAGS ---
        const categoryMap = {};
        
        results.forEach(item => {
            // Read internal category or fallback to split labels
            let tags = item.category || [];
            if (typeof tags === 'string') tags = [tags];
            
            // Generate uniform grouping buckets
            if(!tags.length || tags[0] === "") {
                tags = ["Sights & Landmarks"];
            }

            tags.forEach(tag => {
                const normalized = tag.trim();
                if(!categoryMap[normalized]) {
                    categoryMap[normalized] = [];
                }
                categoryMap[normalized].push(item);
            });
        });

        // Filter out arrays that meet the common threshold profile
        contentWrapper.innerHTML = '';
        let generatedCategoriesCount = 0;

        for (const [categoryTitle, matchedItems] of Object.entries(categoryMap)) {
            // Render if at least 3-5 items match the criteria
            if(matchedItems.length >= 2) {
                generatedCategoriesCount++;

                let cardsHtml = '';
                matchedItems.forEach(item => {
                    const randomRating = item.rating || (4.1 + Math.random() * 0.8).toFixed(1);
                    const randomReviews = item.reviews_count || Math.floor(100 + Math.random() * 3800);
                    const tagLabel = item.location || targetState;

                    cardsHtml += `
                        <a href="details.html?id=${item.id}" class="travel-card">
                            <div class="card-photo-wrapper">
                                <img src="${item.thumbnail}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1548013146-72479768bada?w=500';">
                                <div class="heart-icon-badge" onclick="event.preventDefault();">
                                    <i class="fa-regular fa-heart"></i>
                                </div>
                            </div>
                            <div class="item-name-row">
                                <div class="item-name text-truncate">${item.title}</div>
                            </div>
                            <div class="rating-bar">
                                <span class="rating-num">${randomRating}</span>
                                ${buildRatingDotsHtml(randomRating)}
                                <span class="review-count-text">(${randomReviews})</span>
                            </div>
                            <div class="subtitle-tags text-truncate">${tagLabel}</div>
                        </a>`;
                });

                contentWrapper.innerHTML += `
                    <div class="category-section">
                        <div class="category-header-row">
                            <h3 class="category-title">📍 Highly Rated ${categoryTitle}</h3>
                            <a href="#" class="see-all-link">See all</a>
                        </div>
                        <div class="stunning-horizontal-swiper">
                            ${cardsHtml}
                        </div>
                    </div>`;
            }
        }

        // Fallback display matrix if classifications are completely siloed
        if(generatedCategoriesCount === 0) {
            contentWrapper.innerHTML = `<div class="p-4 text-center text-muted small">Data sets parsed cleanly. Categorizing standard track matrix views.</div>`;
        }

    } catch (err) {
        console.error("Dynamic parsing interface runtime crash logs: ", err);
    }
}

// Intercept inline custom typing entries instantly on Enter click
document.getElementById('topSearchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        window.location.search = `?query=${encodeURIComponent(this.value.trim())}`;
    }
});

window.onload = buildDynamicMatchingInterface;
</script>
</body>
</html>
